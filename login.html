<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF0080">
    <title>Login - Hotel Posta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <!-- 🔥 CRITICAL: Redirect if already logged in -->
    <script>
        if (localStorage.getItem('guestos_logged_in') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FF0080 0%, #FF3399 25%, #00D4FF 75%, #00E5FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Animated Bubbles */
        .bubbles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .bubble {
            position: absolute;
            bottom: -100px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(0,212,255,0.3));
            border-radius: 50%;
            animation: rise 14s infinite ease-in;
            opacity: 0.4;
        }
        
        .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 60px; height: 60px; left: 40%; animation-delay: 4s; }
        .bubble:nth-child(3) { width: 90px; height: 90px; left: 70%; animation-delay: 8s; }
        
        @keyframes rise {
            0% { bottom: -100px; opacity: 0; transform: translateX(0); }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { bottom: 110vh; opacity: 0; transform: translateX(30px); }
        }
        
        .login-container {
            position: relative;
            z-index: 10;
            max-width: 440px;
            width: 100%;
        }
        
        .login-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(40px) saturate(180%);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.2),
                0 0 0 1px rgba(255,255,255,0.2),
                inset 0 1px 0 rgba(255,255,255,0.3);
            border: 2px solid rgba(255,255,255,0.25);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.15),
                0 0 0 1px rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .welcome-title {
            color: white;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }
        
        .welcome-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 700;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            color: white;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
        }
        
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 16px 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: white;
            box-shadow: 
                0 4px 16px rgba(0,0,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        
        .form-input::placeholder {
            color: rgba(255,255,255,0.6);
            font-weight: 600;
        }
        
        .form-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.25);
            box-shadow: 
                0 6px 24px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .login-btn {
            width: 100%;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 18px;
            padding: 18px;
            color: white;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 
                0 8px 30px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            margin-top: 8px;
        }
        
        .login-btn:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }
        
        .login-btn:active {
            transform: scale(0.98) translateY(2px);
            box-shadow: 
                0 4px 20px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .error-message {
            background: rgba(255,59,48,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 16px;
            display: none;
            box-shadow: 0 6px 20px rgba(255,59,48,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .help-text {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            font-weight: 600;
            margin-top: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        
        .demo-credentials {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
        }
        
        .demo-title {
            color: white;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        
        .demo-item {
            color: rgba(255,255,255,0.9);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <!-- Animated Bubbles -->
    <div class="bubbles-bg">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">💧</div>
                <div class="welcome-title">Benvenuto!</div>
                <div class="welcome-subtitle">Accedi con i dati della tua camera</div>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Numero Camera</label>
                    <input 
                        type="text" 
                        id="roomNumber" 
                        class="form-input" 
                        placeholder="Es: 101" 
                        required
                        autocomplete="off"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label">Cognome</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        class="form-input" 
                        placeholder="Il tuo cognome" 
                        required
                        autocomplete="off"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Password ricevuta al check-in" 
                        required
                        autocomplete="off"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    🔓 Accedi
                </button>
                
                <div class="error-message" id="errorMessage"></div>
            </form>
            
            <div class="help-text">
                Non hai ricevuto la password?<br>
                Chiedi alla reception 📞
            </div>
            
            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <div class="demo-title">🧪 Credenziali Test:</div>
                <div class="demo-item">Camera: 101 | Cognome: Rossi | Password: demo123</div>
                <div class="demo-item">Camera: 205 | Cognome: Bianchi | Password: test123</div>
            </div>
        </div>
    </div>
    
    <script>
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const roomNumber = document.getElementById('roomNumber').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const password = document.getElementById('password').value;
            
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            
            // Reset error
            errorMsg.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Accesso in corso...';
            
            try {
                // Query Supabase users table
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('room_number', roomNumber)
                    .eq('last_name', lastName)
                    .eq('password', password)
                    .eq('active', true)
                    .single();
                
                if (error || !data) {
                    throw new Error('Credenziali non valide');
                }
                
                // Update last_login
                await supabaseClient
                    .from('users')
                    .update({ last_login: new Date().toISOString() })
                    .eq('email', data.email);
                
                // Save to localStorage
                localStorage.setItem('guestos_user_email', data.email);
                localStorage.setItem('guestos_user_name', data.last_name);
                localStorage.setItem('guestos_room_number', data.room_number);
                localStorage.setItem('guestos_logged_in', 'true');
                
                // Success!
                loginBtn.textContent = '✅ Accesso riuscito!';
                
                // Redirect to homepage
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
                
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = '❌ Credenziali non valide. Verifica i dati e riprova.';
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = '🔓 Accedi';
            }
        });
    </script>
</body>
</html>
