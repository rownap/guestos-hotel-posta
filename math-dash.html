<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dash - Hotel Posta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #13131f;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #startScreen,
        #resultsScreen {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .game-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            margin-bottom: 16px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .equation {
            font-size: 48px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 40px;
            min-height: 60px;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .answer-btn {
            background: var(--bg-secondary);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            color: white;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .answer-btn:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .answer-btn.correct {
            background: var(--success);
            border-color: var(--success);
        }

        .answer-btn.wrong {
            background: var(--error);
            border-color: var(--error);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: var(--accent-primary);
            width: 100%;
            transition: width 0.1s linear;
        }

        #gameScreen {
            width: 100%;
            display: none;
        }

        #resultsScreen {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='games.html'">
                <i data-lucide="arrow-left"></i>
            </button>
            <div style="text-align: right;">
                <div style="font-size: 14px; opacity: 0.6;">Brain Game</div>
                <div style="font-weight: 700;">Math Dash</div>
            </div>
        </div>

        <div class="game-area">
            <div id="startScreen">
                <div class="game-icon">🔢</div>
                <h1>Math Dash</h1>
                <p style="margin-bottom: 30px; opacity: 0.8;">Risolvi più calcoli possibili in 60 secondi!</p>
                <div class="stat-card" style="margin-bottom: 30px;">
                    <div class="stat-label">Premio</div>
                    <div class="stat-value" style="color: #fbbf24;">+1 punto per risposta</div>
                </div>
                <button class="primary-btn" onclick="startGame()">INIZIA SFIDA</button>
            </div>

            <div id="gameScreen">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Punti</div>
                        <div id="scoreDisplay" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Tempo</div>
                        <div id="timerDisplay" class="stat-value">60</div>
                    </div>
                </div>
                <div class="equation" id="equationDisplay"></div>
                <div class="answer-grid" id="answerGrid"></div>
                <div class="timer-bar">
                    <div id="timerFill" class="timer-fill"></div>
                </div>
            </div>

            <div id="resultsScreen">
                <div class="game-icon">🏆</div>
                <h1>Ottimo Lavoro!</h1>
                <div class="stats" style="margin: 30px 0;">
                    <div class="stat-card">
                        <div class="stat-label">Corrette</div>
                        <div id="finalScore" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Punti Bonus</div>
                        <div id="pointsEarned" class="stat-value" style="color: #fbbf24;">+0</div>
                    </div>
                </div>
                <button class="primary-btn" onclick="window.location.href='games.html'">PROSSIMA SFIDA</button>
                <button class="primary-btn"
                    style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);"
                    onclick="location.reload()">RIGIOCA</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let score = 0;
        let timeLeft = 60;
        let timer;
        let currentAnswer;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').textContent = timeLeft;
                document.getElementById('timerFill').style.width = (timeLeft / 60 * 100) + '%';
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextQuestion() {
            const num1 = Math.floor(Math.random() * 20) + 1;
            const num2 = Math.floor(Math.random() * 20) + 1;
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];

            let equationText = `${num1} ${op} ${num2}`;

            if (op === '+') currentAnswer = num1 + num2;
            else if (op === '-') currentAnswer = num1 - num2;
            else currentAnswer = num1 * num2;

            document.getElementById('equationDisplay').textContent = equationText + ' = ?';

            const answers = [currentAnswer];
            while (answers.length < 4) {
                const wrong = currentAnswer + (Math.floor(Math.random() * 10) - 5);
                if (!answers.includes(wrong)) answers.push(wrong);
            }
            answers.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('answerGrid');
            grid.innerHTML = '';
            answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = ans;
                btn.onclick = () => checkAnswer(ans, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(ans, btn) {
            if (ans === currentAnswer) {
                score++;
                document.getElementById('scoreDisplay').textContent = score;
                btn.classList.add('correct');
                setTimeout(nextQuestion, 200);
            } else {
                btn.classList.add('wrong');
                setTimeout(nextQuestion, 200);
            }
        }

        async function endGame() {
            clearInterval(timer);
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('pointsEarned').textContent = '+' + score;

            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';

            try {
                // Save points
                const { data: current } = await supabaseClient.from('user_points').select('points').eq('user_email', email).single();
                const newPoints = (current?.points || 0) + score;
                await supabaseClient.from('user_points').update({ points: newPoints, updated_at: new Date().toISOString() }).eq('user_email', email);

                // Save to leaderboard
                if (typeof saveGameScore === 'function') {
                    saveGameScore('math_dash', score);
                }
            } catch (err) {
                console.error('Error saving score:', err);
            }
        }
    </script>
</body>

</html>
