<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Board - Hotel Posta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #13131f;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            margin-bottom: 16px;
        }

        .challenge-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .challenge-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .challenge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .challenge-author {
            font-size: 14px;
            opacity: 0.6;
        }

        .challenge-text {
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .challenge-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            opacity: 0.5;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 32px;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='games.html'">
                <i data-lucide="arrow-left"></i>
            </button>
            <div style="text-align: right;">
                <div style="font-size: 14px; opacity: 0.6;">Sociale</div>
                <div style="font-weight: 700;">Community Board</div>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 64px; margin-bottom: 16px;">👥</div>
            <h1>Community Board</h1>
            <p style="opacity: 0.8;">Scopri sfide create dagli altri ospiti o crea le tue!</p>
        </div>

        <button class="primary-btn" onclick="openCreateModal()">
            <i data-lucide="plus" style="width: 20px; height: 20px; vertical-align: middle;"></i>
            CREA NUOVA SFIDA
        </button>

        <div style="margin-top: 40px;">
            <h3 style="margin-bottom: 20px;">Sfide della Community</h3>
            <div id="challengesList">
                <div style="text-align: center; padding: 40px; opacity: 0.6;">
                    <p>Caricamento sfide...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Crea la Tua Sfida</h2>
            <textarea id="challengeText" placeholder="Scrivi la tua domanda/sfida..."></textarea>
            <input type="text" id="challengeAnswer" placeholder="La risposta corretta..."
                style="width: 100%; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); padding: 16px; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px;">
            <div style="display: flex; gap: 12px;">
                <button class="primary-btn" style="flex: 1;" onclick="publishChallenge()">PUBBLICA</button>
                <button class="secondary-btn" onclick="closeCreateModal()">ANNULLA</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let challenges = [];

        async function loadChallenges() {
            try {
                const { data, error } = await supabaseClient
                    .from('community_challenges')
                    .select('*')
                    .eq('is_approved', true)
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error) throw error;

                challenges = data || [];
                renderChallenges();
            } catch (err) {
                console.error('Error loading challenges:', err);
                // Show message to user
                document.getElementById('challengesList').innerHTML = `
                    <div style="text-align: center; padding: 40px; opacity: 0.6;">
                        <p>Impossibile caricare le sfide. Riprova più tardi.</p>
                    </div>
                `;
            }
        }

        function renderChallenges() {
            const container = document.getElementById('challengesList');

            if (challenges.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; opacity: 0.6;">
                        <p>📝 Nessuna sfida ancora! Sii il primo a crearne una!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = challenges.map((challenge, idx) => {
                const timeAgo = getTimeAgo(new Date(challenge.created_at));
                return `
                    <div class="challenge-card">
                        <div class="challenge-header">
                            <div class="challenge-author">👤 ${challenge.author_name || 'Ospite Anonimo'}</div>
                            <div style="font-size: 12px; opacity: 0.5;">${timeAgo}</div>
                        </div>
                        <div class="challenge-text">${challenge.challenge_text}</div>
                        <div class="challenge-meta">
                            <span>⭐ ${challenge.completion_count} completamenti</span>
                            <span>🎁 +${challenge.points} punti</span>
                        </div>
                        <button class="secondary-btn" style="margin-top: 12px;" onclick="attemptChallenge('${challenge.id}', ${idx})">
                            Prova Sfida
                        </button>
                    </div>
                `;
            }).join('');
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'ora';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}min fa`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h fa`;
            return `${Math.floor(seconds / 86400)}g fa`;
        }

        function openCreateModal() {
            document.getElementById('createModal').style.display = 'flex';
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
            document.getElementById('challengeText').value = '';
            document.getElementById('challengeAnswer').value = '';
        }

        async function publishChallenge() {
            const text = document.getElementById('challengeText').value.trim();
            const answer = document.getElementById('challengeAnswer').value.trim();

            if (!text || !answer) {
                alert('Compila tutti i campi!');
                return;
            }

            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';
            const username = localStorage.getItem('guestos_username') || email.split('@')[0];

            try {
                const { data, error } = await supabaseClient
                    .from('community_challenges')
                    .insert([{
                        author_email: email,
                        author_name: username,
                        challenge_text: text,
                        answer: answer.toLowerCase(),
                        points: 10,
                        difficulty: 'medium'
                    }])
                    .select();

                if (error) throw error;

                alert('✅ Sfida pubblicata con successo! Gli altri ospiti possono ora provarla.');
                closeCreateModal();
                loadChallenges(); // Reload to show new challenge
            } catch (err) {
                console.error('Error publishing challenge:', err);
                alert('Errore durante la pubblicazione. Riprova.');
            }
        }

        async function attemptChallenge(challengeId, index) {
            const challenge = challenges[index];
            const userAnswer = prompt(challenge.challenge_text);

            if (!userAnswer) return;

            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';

            if (userAnswer.toLowerCase().trim() === challenge.answer.toLowerCase()) {
                try {
                    // Check if already completed
                    const { data: existing } = await supabaseClient
                        .from('challenge_completions')
                        .select('id')
                        .eq('challenge_id', challengeId)
                        .eq('user_email', email)
                        .single();

                    if (existing) {
                        alert('Hai già completato questa sfida!');
                        return;
                    }

                    // Record completion
                    await supabaseClient
                        .from('challenge_completions')
                        .insert([{
                            challenge_id: challengeId,
                            user_email: email
                        }]);

                    // Update completion count
                    await supabaseClient
                        .from('community_challenges')
                        .update({ completion_count: challenge.completion_count + 1 })
                        .eq('id', challengeId);

                    // Award points
                    const { data: current } = await supabaseClient
                        .from('user_points')
                        .select('points')
                        .eq('user_email', email)
                        .single();

                    const newPoints = (current?.points || 0) + challenge.points;
                    await supabaseClient
                        .from('user_points')
                        .update({ points: newPoints })
                        .eq('user_email', email);

                    if (typeof saveGameScore === 'function') {
                        saveGameScore('community_board', challenge.points);
                    }

                    alert(`✅ Corretto! Hai guadagnato ${challenge.points} punti!`);
                    loadChallenges(); // Reload to show updated count
                } catch (err) {
                    console.error('Error saving completion:', err);
                    alert('Errore durante il salvataggio. Riprova.');
                }
            } else {
                alert('❌ Risposta errata! Riprova.');
            }
        }

        // Load challenges on page load
        loadChallenges();
    </script>
</body>

</html>
