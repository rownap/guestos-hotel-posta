<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Shooter - Hotel Posta</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #0c0a09 0%, #000 100%);
            z-index: 0;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .game-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #06b6d4, #facc15);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .score-display {
            position: absolute;
            top: 100px;
            font-size: 80px;
            font-weight: 900;
            color: white;
            opacity: 0.2;
            z-index: 5;
            pointer-events: none;
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 110;
            padding: 30px;
            text-align: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
        }

        .action-btn {
            background: white;
            color: #0a0a12;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        .how-to-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }

        .how-to-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .how-to-item:last-child {
            margin-bottom: 0;
        }

        .how-to-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #06b6d4;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='games.html'"><i data-lucide="arrow-left"></i></button>
        <div class="game-title">Star Shooter</div>
        <div style="width: 44px;"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="score-display" id="scoreDisplay">0</div>

    <!-- Start Overlay -->
    <div id="startOverlay" class="ui-overlay">
        <div class="glass-panel">
            <div style="font-size: 60px; margin-bottom: 20px;">🌠</div>
            <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 8px;">Star Shooter</h2>
            <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 24px;">Battaglia galattica</p>

            <div class="how-to-box">
                <div class="how-to-item">
                    <div class="how-to-icon"><i data-lucide="move" style="width:16px;"></i></div>
                    <div>Trascina per <b>muovere</b> la nave</div>
                </div>
                <div class="how-to-item">
                    <div class="how-to-icon"><i data-lucide="zap" style="width:16px;"></i></div>
                    <div>Lo sparo è <b>automatico</b></div>
                </div>
                <div class="how-to-item">
                    <div class="how-to-icon"><i data-lucide="shield-alert" style="width:16px;"></i></div>
                    <div>Distruggi gli asteroidi!</div>
                </div>
                <div id="gamesRemainingText"
                    style="font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 12px; text-align: center;">Punti
                    Disp.: --/5</div>
            </div>

            <button class="action-btn" onclick="startGame()">DECOLLA</button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverOverlay" class="ui-overlay hidden">
        <div class="glass-panel">
            <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 12px; color: #ef4444;">NAVE DISTRUTTA</h2>
            <div id="finalScoreDisplay" style="font-size: 64px; font-weight: 900; color: #06b6d4; margin-bottom: 24px;">
                0</div>
            <div id="hotelPointsDisplay"
                style="color: #facc15; font-weight: 800; font-size: 20px; margin-bottom: 32px;">+0 Punti Hotel</div>
            <div id="limitMessage" style="color: #06b6d4; font-size: 12px; margin-bottom: 20px; display: none;">
                Ricarica domani per altri punti! 🚀
            </div>
            <button class="action-btn" onclick="startGame()">MISSIONE NUOVA</button>
            <button class="action-btn" style="margin-top: 12px; background: rgba(255,255,255,0.1); color: white;"
                onclick="window.location.href='games.html'">RIENTRA ALLA BASE</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, dpr;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        let gameState = 'start';
        let score = 0;
        let player = { x: 0, y: 0, w: 40, h: 40 };

        const MAX_SCORED_GAMES = 5;
        const MAX_POINTS = 2;
        let gamesLeft = MAX_SCORED_GAMES;

        function checkDailyLimit() {
            const lastDate = localStorage.getItem('star_shooter_date');
            const today = new Date().toDateString();

            if (lastDate !== today) {
                gamesLeft = MAX_SCORED_GAMES;
                localStorage.setItem('star_shooter_date', today);
                localStorage.setItem('star_shooter_games', gamesLeft);
            } else {
                gamesLeft = parseInt(localStorage.getItem('star_shooter_games') || MAX_SCORED_GAMES);
            }
            updateLimitUI();
        }

        function updateLimitUI() {
            const text = gamesLeft > 0 ? `Punti Disp.: ${gamesLeft}/${MAX_SCORED_GAMES}` : 'Punti esauriti (Gioca for fun)';
            document.getElementById('gamesRemainingText').textContent = text;
        }

        let bullets = [];
        let enemies = [];
        let particles = [];
        let frame = 0;
        let lastTouchX = 0;
        let shake = 0;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 3 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
                return this.life <= 0;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 10;
                this.r = 4;
            }
            update() { this.y -= this.speed; return this.y < -10; }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#06b6d4';
                ctx.fillStyle = '#06b6d4';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.size = 30 + Math.random() * 40;
                this.x = Math.random() * (width - this.size) + this.size / 2;
                this.y = -this.size;
                this.speed = 2 + Math.random() * 3;
                this.maxHp = Math.ceil(this.size / 15);
                this.hp = this.maxHp;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.rot = 0;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
            }
            update() {
                this.y += this.speed;
                this.rot += this.rotSpeed;
                return this.y > height + this.size;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot);

                // Flash white if just hit (visual feedback)
                const hitFlash = this.hp < this.maxHp && (Date.now() % 200) < 100;
                ctx.strokeStyle = hitFlash ? '#ffffff' : this.color;
                ctx.lineWidth = hitFlash ? 4 : 2;
                ctx.shadowBlur = hitFlash ? 20 : 10;
                ctx.shadowColor = hitFlash ? '#ffffff' : this.color;
                ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            player.x = width / 2;
            player.y = height - 100;
            bullets = [];
            enemies = [];
            particles = [];
            frame = 0;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('scoreDisplay').textContent = "0";
            checkDailyLimit(); // Ensure sync
            requestAnimationFrame(loop);
        }

        function loop() {
            if (gameState !== 'playing') return;
            ctx.clearRect(0, 0, width, height);
            frame++;

            // Spawn
            if (frame % 8 === 0) bullets.push(new Bullet(player.x, player.y - 20));
            if (frame % Math.max(10, 40 - Math.floor(frame / 500)) === 0) enemies.push(new Enemy());

            // Particles
            particles = particles.filter(p => {
                const dead = p.update();
                if (!dead) p.draw();
                return !dead;
            });

            // Screenshake
            ctx.save();
            if (shake > 0) {
                ctx.translate(Math.random() * shake - shake / 2, Math.random() * shake - shake / 2);
                shake *= 0.9;
            }

            // Draw Bullets
            bullets = bullets.filter(b => {
                const off = b.update();
                if (!off) b.draw();
                return !off;
            });

            enemies = enemies.filter(e => {
                const off = e.update();
                if (!off) {
                    e.draw();
                    // Bullet collision
                    bullets.forEach((b, bi) => {
                        const dist = Math.sqrt((b.x - e.x) ** 2 + (b.y - e.y) ** 2);
                        if (dist < e.size / 2 + b.r) {
                            e.hp--;
                            shake = 3;
                            b.y = -100;
                            if (e.hp <= 0) {
                                score += 10;
                                shake = 10;
                                document.getElementById('scoreDisplay').textContent = score;
                                for (let i = 0; i < 15; i++) {
                                    particles.push(new Particle(e.x, e.y, e.color));
                                }
                            }
                        }
                    });
                    // Player collision
                    const pDist = Math.sqrt((player.x - e.x) ** 2 + (player.y - e.y) ** 2);
                    if (pDist < e.size / 2 + 15) {
                        shake = 30;
                        gameOver();
                    }
                }
                return !off && e.hp > 0;
            });

            ctx.restore(); // for screenshake

            // Player ship
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-15, 15);
            ctx.lineTo(0, 5);
            ctx.lineTo(15, 15);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            requestAnimationFrame(loop);
        }

        // Controls
        const handleMove = (x) => {
            if (gameState !== 'playing') return;
            player.x = Math.max(20, Math.min(width - 20, x));
        };

        window.addEventListener('touchmove', e => {
            handleMove(e.touches[0].clientX);
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('mousemove', e => handleMove(e.clientX));

        async function gameOver() {
            if (gameState === 'over') return;
            if (gameState === 'over') return;
            gameState = 'over';

            // Score calc: 10 pts per enemy.
            // Old Logic: score / 50 = points. (100 score -> 2 pts). Max 20.
            // New Request: 2 pts max per game.
            // Let's keep / 50 ratio but cap at 2.
            // So 100 game_score = 2 hotel_pts.

            let hotelPoints = 0;
            if (gamesLeft > 0) {
                hotelPoints = Math.min(Math.floor(score / 50), MAX_POINTS);
            }

            document.getElementById('finalScoreDisplay').textContent = score;
            document.getElementById('hotelPointsDisplay').textContent = `+${hotelPoints} Punti Hotel`;

            if (gamesLeft > 0 && hotelPoints > 0) {
                gamesLeft--;
                localStorage.setItem('star_shooter_games', gamesLeft);
            }
            updateLimitUI();

            const limitMsg = document.getElementById('limitMessage');
            if (gamesLeft <= 0 && hotelPoints === 0) {
                limitMsg.style.display = 'block';
            } else {
                limitMsg.style.display = 'none';
            }
            document.getElementById('gameOverOverlay').classList.remove('hidden');

            if (hotelPoints > 0) await savePoints(hotelPoints);
            if (typeof saveGameScore === 'function') saveGameScore('star_shooter', score);
        }

        async function savePoints(pts) {
            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';
            try {
                const { data } = await supabaseClient.from('user_points').select('points').eq('user_email', email).single();
                const newPts = (data?.points || 0) + pts;
                await supabaseClient.from('user_points').upsert({ user_email: email, user_name: localStorage.getItem('guestos_user_name') || 'Ospite', points: newPts, updated_at: new Date().toISOString() }, { onConflict: 'user_email' });
            } catch (e) { console.error(e); }
        }

        checkDailyLimit();
    </script>
</body>

</html>
