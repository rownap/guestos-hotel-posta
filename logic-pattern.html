<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Pattern - Hotel Posta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #13131f;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #startScreen,
        #resultsScreen {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .game-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            margin-bottom: 16px;
        }

        .level-dots {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dot.active {
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .dot.completed {
            background: var(--success);
        }

        .pattern-display {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 40px 20px;
            width: 100%;
            margin-bottom: 30px;
            font-size: 36px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        .option-btn {
            background: var(--bg-secondary);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            border-radius: 16px;
            color: white;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: var(--success);
            border-color: var(--success);
        }

        .option-btn.wrong {
            background: var(--error);
            border-color: var(--error);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        #gameScreen {
            width: 100%;
            display: none;
        }

        #resultsScreen {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='games.html'">
                <i data-lucide="arrow-left"></i>
            </button>
            <div style="text-align: right;">
                <div style="font-size: 14px; opacity: 0.6;">Logic Game</div>
                <div style="font-weight: 700;">Logic Pattern</div>
            </div>
        </div>

        <div class="game-area">
            <div id="startScreen">
                <div class="game-icon">🧩</div>
                <h1>Logic Pattern</h1>
                <p style="margin-bottom: 30px; opacity: 0.8;">Completa la sequenza logica. 5 livelli di difficoltà
                    crescente!</p>
                <div
                    style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; margin-bottom: 30px;">
                    <div style="font-size: 12px; opacity: 0.5; text-transform: uppercase;">Premio</div>
                    <div style="font-size: 24px; font-weight: 700; color: #fbbf24;">+10 Punti Bonus</div>
                </div>
                <button class="primary-btn" onclick="startGame()">COMINCIA</button>
            </div>

            <div id="gameScreen">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="level-dots" id="levelDots" style="margin-bottom: 0;">
                        <div class="dot active"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div id="timerDisplay"
                        style="font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--error);">
                        60s</div>
                </div>
                <div class="pattern-display" id="patternText">2, 4, 6, 8, ?</div>
                <div class="option-grid" id="optionGrid"></div>
            </div>

            <div id="resultsScreen">
                <div class="game-icon">👑</div>
                <h1>Geniale!</h1>
                <p style="margin-bottom: 30px; opacity: 0.8;">Hai completato tutti i livelli di logica.</p>
                <div style="background: var(--success); padding: 20px; border-radius: 16px; margin-bottom: 30px;">
                    <div style="font-size: 12px; opacity: 0.8; text-transform: uppercase; color: white;">Punti
                        Guadagnati</div>
                    <div style="font-size: 32px; font-weight: 900; color: white;">+10</div>
                </div>
                <button class="primary-btn" onclick="window.location.href='games.html'">ALTRI GIOCHI</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const levels = [
            { pattern: "2, 4, 6, 8, ?", options: ["9", "10", "12", "11"], correct: "10" },
            { pattern: "1, 3, 9, 27, ?", options: ["54", "81", "36", "40"], correct: "81" },
            { pattern: "A, C, E, G, ?", options: ["H", "I", "F", "J"], correct: "I" },
            { pattern: "1, 1, 2, 3, 5, ?", options: ["6", "8", "9", "7"], correct: "8" },
            { pattern: "1, 4, 9, 16, ?", options: ["20", "25", "36", "24"], correct: "25" }
        ];

        let currentLevel = 0;
        let timeLeft = 60;
        let timerInterval;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            loadLevel();
            startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').textContent = timeLeft + 's';
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Tempo scaduto!");
                    location.reload();
                }
            }, 1000);
        }

        function loadLevel() {
            const level = levels[currentLevel];
            document.getElementById('patternText').textContent = level.pattern;

            const grid = document.getElementById('optionGrid');
            grid.innerHTML = '';

            level.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkLogic(opt, btn);
                grid.appendChild(btn);
            });

            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.className = 'dot';
                if (i < currentLevel) dot.classList.add('completed');
                else if (i === currentLevel) dot.classList.add('active');
            });
        }

        function checkLogic(choice, btn) {
            const level = levels[currentLevel];
            if (choice === level.correct) {
                btn.classList.add('correct');
                setTimeout(() => {
                    currentLevel++;
                    if (currentLevel >= levels.length) {
                        clearInterval(timerInterval);
                        endGame();
                    }
                    else loadLevel();
                }, 500);
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        async function endGame() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';

            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';

            try {
                const { data: current } = await supabaseClient.from('user_points').select('points').eq('user_email', email).single();
                const newPoints = (current?.points || 0) + 10;
                await supabaseClient.from('user_points').upsert({ user_email: email, user_name: localStorage.getItem('guestos_user_name') || 'Ospite', points: newPoints, updated_at: new Date().toISOString() }, { onConflict: 'user_email' });

                if (typeof saveGameScore === 'function') {
                    saveGameScore('logic_pattern', 100); // 100 as a percentage/score
                }
            } catch (err) {
                console.error('Error saving logic score:', err);
            }
        }
    </script>
</body>

</html>
