<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestos Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #FF0080 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background bubbles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), rgba(255,255,255,0.05));
            animation: float 20s infinite ease-in-out;
            opacity: 0.4;
        }
        
        .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; bottom: -100px; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 120px; height: 120px; left: 30%; bottom: -150px; animation-delay: 4s; }
        .bubble:nth-child(3) { width: 100px; height: 100px; right: 20%; bottom: -120px; animation-delay: 2s; }
        .bubble:nth-child(4) { width: 60px; height: 60px; right: 10%; bottom: -80px; animation-delay: 6s; }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
        
        .login-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
        }
        
        .login-box {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 
                0 20px 80px rgba(0, 0, 0, 0.25),
                inset 0 2px 0 rgba(255, 255, 255, 0.5);
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .brand-name {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #FF0080, #764ba2, #00D4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .brand-subtitle {
            font-size: 14px;
            color: #666;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.5);
        }
        
        .login-btn:active {
            transform: translateY(-1px);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.show {
            display: block;
        }
        
        .error-message {
            background: rgba(255, 68, 68, 0.15);
            border: 2px solid rgba(255, 68, 68, 0.3);
            color: #d32f2f;
        }
        
        .success-message {
            background: rgba(0, 200, 83, 0.15);
            border: 2px solid rgba(0, 200, 83, 0.3);
            color: #00c853;
        }
        
        .security-note {
            background: rgba(102, 126, 234, 0.08);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 14px;
            padding: 16px;
            margin-top: 25px;
            text-align: center;
        }
        
        .security-note-title {
            font-size: 12px;
            font-weight: 800;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        .security-note-text {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="logo">🏨</div>
                <div class="brand-name">Guestos</div>
                <div class="brand-subtitle">Admin Panel</div>
            </div>
            
            <div class="error-message message" id="errorMessage"></div>
            <div class="success-message message" id="successMessage"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">📧 Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input"
                        placeholder="admin@hotelposta.it"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label">🔒 Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    🚀 Accedi alla Dashboard
                </button>
            </form>
            
            <div class="security-note">
                <div class="security-note-title">🛡️ Accesso Sicuro</div>
                <div class="security-note-text">
                    Accesso riservato al personale autorizzato.<br>
                    Tutte le azioni vengono registrate.
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Supabase Config (inline per sicurezza)
        const SB_URL = "https://gqqgotvbabgxztrxbozu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcWdvdHZiYWJneHp0cnhib3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwODM4MjgsImV4cCI6MjA4NDY1OTgyOH0.gFc_bLefoFuVW21MSMEg30CD97bFfVeHEQDhkfe_2QY";
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const adminSession = localStorage.getItem('guestos_admin_session');
            if (adminSession) {
                try {
                    const session = JSON.parse(adminSession);
                    // Verify session is not expired (24h)
                    if (Date.now() - session.timestamp < 24 * 60 * 60 * 1000) {
                        window.location.href = 'guestos-admin-dashboard.html';
                        return;
                    }
                } catch (e) {
                    localStorage.removeItem('guestos_admin_session');
                }
            }
        });
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            // Reset messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Verifica credenziali...';
            
            try {
                // Call Supabase function for login
                const { data, error } = await supabaseClient
                    .rpc('admin_login', {
                        p_email: email,
                        p_password: password
                    });
                
                if (error) {
                    console.error('Login error:', error);
                    throw new Error('Errore di connessione al server');
                }
                
                if (!data || data.length === 0) {
                    throw new Error('Email o password non corretti');
                }
                
                const admin = data[0];
                
                // Save session
                const session = {
                    id: admin.id,
                    email: admin.email,
                    full_name: admin.full_name,
                    hotel_id: admin.hotel_id,
                    hotel_name: admin.hotel_name,
                    role: admin.role,
                    timestamp: Date.now()
                };
                
                localStorage.setItem('guestos_admin_session', JSON.stringify(session));
                
                // Show success
                successMsg.textContent = `✅ Benvenuto ${admin.full_name}!`;
                successMsg.classList.add('show');
                loginBtn.textContent = '✅ Accesso riuscito!';
                
                // Redirect
                setTimeout(() => {
                    window.location.href = 'guestos-admin-dashboard.html';
                }, 1000);
                
            } catch (error) {
                console.error('Login failed:', error);
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = '🚀 Accedi alla Dashboard';
            }
        }
    </script>
</body>
</html>
