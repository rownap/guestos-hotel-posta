<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guestos Admin - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Poppins', sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}
.login-box {
background: white;
border-radius: 25px;
padding: 50px;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
max-width: 400px;
width: 90%;
}
.logo { font-size: 60px; text-align: center; margin-bottom: 20px; }
h1 {
text-align: center;
font-size: 28px;
font-weight: 900;
background: linear-gradient(135deg, #FF0080, #00D4FF);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 40px;
}
.form-group { margin-bottom: 25px; }
label {
display: block;
font-size: 13px;
font-weight: 800;
color: #333;
margin-bottom: 8px;
text-transform: uppercase;
}
input {
width: 100%;

padding: 15px;
border: 2px solid #e0e0e0;
border-radius: 12px;
font-size: 15px;
font-weight: 600;
font-family: 'Poppins', sans-serif;
}
input:focus {
outline: none;
border-color: #667eea;
}
button {
width: 100%;
background: linear-gradient(135deg, #667eea, #764ba2);
border: none;
color: white;
padding: 18px;
border-radius: 12px;
font-size: 16px;
font-weight: 900;
cursor: pointer;
box-shadow: 0 6px 20px rgba(102,126,234,0.4);
}
button:hover { transform: translateY(-2px); }
.error {
background: rgba(255,68,68,0.1);
color: #ff4444;
padding: 15px;
border-radius: 10px;
margin-bottom: 20px;
font-weight: 700;
font-size: 14px;
display: none;
}
</style>
</head>
<body>
<div class="login-box">
<div class="logo">💧 </div>
<h1>Guestos Admin</h1>
<div class="error" id="error"></div>
<form onsubmit="login(event)">
<div class="form-group">
<label>Email</label>
<input type="email" id="email" required placeholder="admin@hotel.it">
</div>
<div class="form-group">

<label>Password</label>
<input type="password" id="password" required placeholder="••••••••">
</div>
<button type="submit">🚀 Accedi</button>
</form>
</div>
<script>
// Login semplice (DEMO - in produzione usa Supabase Auth)
function login(e) {
e.preventDefault();
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
// Credenziali DEMO (CAMBIA IN PRODUZIONE!)
if (email === 'admin@hotelposta.it' && password === 'demo2024') {
localStorage.setItem('guestos_admin_logged', 'true');
window.location.href = 'dashboard.html';
} else {
const error = document.getElementById('error');
error.textContent = '❌ Credenziali non valide';
error.style.display = 'block';
}
}
</script>
</body>
</html>
