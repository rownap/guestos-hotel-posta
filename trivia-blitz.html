<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Blitz - Hotel Posta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #13131f;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #startScreen,
        #resultsScreen {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .game-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            margin-bottom: 16px;
        }

        .trivia-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-list {
            display: grid;
            gap: 12px;
            width: 100%;
        }

        .opt-btn {
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .opt-btn:hover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .opt-btn.correct {
            background: var(--success);
            border-color: var(--success);
        }

        .opt-btn.wrong {
            background: var(--error);
            border-color: var(--error);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-primary);
            width: 0%;
            transition: width 0.3s;
        }

        #gameScreen {
            width: 100%;
            display: none;
        }

        #resultsScreen {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='games.html'">
                <i data-lucide="arrow-left"></i>
            </button>
            <div style="text-align: right;">
                <div style="font-size: 14px; opacity: 0.6;">Cultura & Logica</div>
                <div style="font-weight: 700;">Trivia Blitz</div>
            </div>
        </div>

        <div class="game-area">
            <div id="startScreen">
                <div class="game-icon">💡</div>
                <h1>Trivia Blitz</h1>
                <p style="margin-bottom: 30px; opacity: 0.8;">10 domande veloci su cultura generale, logica e curiosità
                    calabresi!</p>
                <div
                    style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; margin-bottom: 30px;">
                    <div style="font-size: 12px; opacity: 0.5; text-transform: uppercase;">Premio</div>
                    <div style="font-size: 24px; font-weight: 700; color: #fbbf24;">+5 pt (Primi 3 giochi)</div>
                    <div id="gamesRemainingText"
                        style="font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 8px;">Punti Disp.: --/3</div>
                </div>
                <button class="primary-btn" onclick="startGame()">COMINCIA ORA</button>
            </div>

            <div id="gameScreen">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div id="questionCounter" style="font-size: 14px; opacity: 0.6; margin-bottom: 0;">Domanda 1/10
                    </div>
                    <div id="timerDisplay"
                        style="font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--error);">
                        15s</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="trivia-card">
                    <div class="question-text" id="qText">Caricamento...</div>
                    <div class="options-list" id="optionsList"></div>
                </div>
            </div>

            <div id="resultsScreen">
                <div class="game-icon">🏅</div>
                <h1>Risultato Blitz!</h1>
                <div style="display: flex; gap: 20px; margin: 30px 0;">
                    <div style="flex: 1; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px;">
                        <div style="font-size: 12px; opacity: 0.5;">CORRETTE</div>
                        <div style="font-size: 28px; font-weight: 700;" id="correctCount">0</div>
                    </div>
                    <div style="flex: 1; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px;">
                        <div style="font-size: 12px; opacity: 0.5;">PUNTI</div>
                        <div style="font-size: 28px; font-weight: 700; color: #fbbf24;" id="totalPoints">0</div>
                    </div>
                </div>
                <div id="limitMessage" style="color: #6366f1; font-size: 14px; margin-bottom: 20px; display: none;">
                    Punti giornalieri esauriti! Gioca per allenarti 🧠
                </div>
                <button class="primary-btn" onclick="window.location.href='games.html'">MENU GIOCHI</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const questions = [
            { q: "Qual è il pianeta più vicino al Sole?", o: ["Venere", "Marte", "Mercurio", "Giove"], a: 2 },
            { q: "Quanti sono i capoluoghi di provincia in Calabria?", o: ["3", "4", "5", "6"], a: 2 },
            { q: "In logica, se tutti i corvi sono neri e questo è un corvo...", o: ["È bianco", "È nero", "È grigio", "Non si può sapere"], a: 1 },
            { q: "Quale città calabrese si trova sullo Stretto di Messina?", o: ["Catanzaro", "Villa San Giovanni", "Crotone", "Lamezia Terme"], a: 1 },
            { q: "Quanto fa 11 x 11?", o: ["111", "121", "131", "141"], a: 1 },
            { q: "Chi ha dipinto la Gioconda?", o: ["Michelangelo", "Raffaello", "Leonardo da Vinci", "Donatello"], a: 2 },
            { q: "Qual è la montagna più alta della Calabria?", o: ["Pollino", "Sila", "Aspromonte", "Serre"], a: 0 },
            { q: "In quale anno è stata scoperta l'America?", o: ["1492", "1592", "1392", "1692"], a: 0 },
            { q: "Quante gambe ha un ragno?", o: ["6", "8", "10", "12"], a: 1 },
            { q: "Quale di questi è un metallo prezioso?", o: ["Ferro", "Rame", "Oro", "Piombo"], a: 2 }
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 15;
        let timerInterval;

        const MAX_SCORED_GAMES = 3;
        const POINTS_PER_GAME = 5;
        let gamesLeft = MAX_SCORED_GAMES;

        function checkDailyLimit() {
            const lastDate = localStorage.getItem('trivia_blitz_date');
            const today = new Date().toDateString();

            if (lastDate !== today) {
                gamesLeft = MAX_SCORED_GAMES;
                localStorage.setItem('trivia_blitz_date', today);
                localStorage.setItem('trivia_blitz_games', gamesLeft);
            } else {
                gamesLeft = parseInt(localStorage.getItem('trivia_blitz_games') || MAX_SCORED_GAMES);
            }
            updateLimitUI();
        }

        function updateLimitUI() {
            const text = gamesLeft > 0 ? `Punti Disp.: ${gamesLeft}/${MAX_SCORED_GAMES}` : 'Punti esauriti (Gioca for fun)';
            document.getElementById('gamesRemainingText').textContent = text;
        }

        function startGame() {
            checkDailyLimit(); // Ensure fresh state
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            loadQuestion();
        }

        function startTimer() {
            timeLeft = 15;
            document.getElementById('timerDisplay').textContent = timeLeft + 's';
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').textContent = timeLeft + 's';
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    selectOption(-1, null); // Time out
                }
            }, 1000);
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('qText').textContent = data.q;
            document.getElementById('questionCounter').textContent = `Domanda ${currentQ + 1}/10`;
            document.getElementById('progressFill').style.width = ((currentQ + 1) / 10 * 100) + '%';

            const list = document.getElementById('optionsList');
            list.innerHTML = '';

            data.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.textContent = opt;
                btn.onclick = () => selectOption(i, btn);
                list.appendChild(btn);
            });

            startTimer();
        }

        function selectOption(idx, btn) {
            clearInterval(timerInterval);
            const data = questions[currentQ];
            if (idx === data.a) {
                score++;
                if (btn) btn.classList.add('correct');
            } else {
                if (btn) btn.classList.add('wrong');
                // Highlight correct one
                const buttons = document.querySelectorAll('.opt-btn');
                if (buttons[data.a]) buttons[data.a].classList.add('correct');
            }

            // Lock all buttons
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

            setTimeout(() => {
                currentQ++;
                if (currentQ < 10) loadQuestion();
                else endGame();
            }, 800);
        }

        async function endGame() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
            document.getElementById('correctCount').textContent = score;
            document.getElementById('correctCount').textContent = score;

            // Calc points: score must be decent (e.g. > 5 correct) to win? No, user said 5 pts per game not per answer.
            // Old Code: score * 5. This was huge inflation (10 q * 5 = 50!).
            // User requested: "Decrease points".
            // New Plan: Flat 5 points if they play decent? Or 5 pts max?
            // "Points for first 3 games (5 pts/game)" implies flat 5 pts if they win/play?
            // Let's assume proportional: 0.5 pts per correct answer? (10 * 0.5 = 5).
            // Or just cap at 5.

            let points = 0;
            if (gamesLeft > 0) {
                points = Math.ceil(score * 0.5); // Max 5 pts (10 * 0.5)
            }

            document.getElementById('totalPoints').textContent = '+' + points;

            if (gamesLeft > 0) {
                gamesLeft--;
                localStorage.setItem('trivia_blitz_games', gamesLeft);
            }
            updateLimitUI();

            if (gamesLeft <= 0 && points === 0) {
                document.getElementById('limitMessage').style.display = 'block';
            } else {
                document.getElementById('limitMessage').style.display = 'none';
            }

            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';

            try {
                const { data: current } = await supabaseClient.from('user_points').select('points').eq('user_email', email).single();
                const newPoints = (current?.points || 0) + points;
                await supabaseClient.from('user_points').upsert({ user_email: email, user_name: localStorage.getItem('guestos_user_name') || 'Ospite', points: newPoints, updated_at: new Date().toISOString() }, { onConflict: 'user_email' });

                if (typeof saveGameScore === 'function') {
                    saveGameScore('trivia_blitz', score * 10);
                }
            } catch (err) {
                console.error('Error saving trivia score:', err);
            }
        }

        // Init
        checkDailyLimit();
    </script>
</body>

</html>
