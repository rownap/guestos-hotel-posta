<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Calabria - Hotel Posta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FF0080 0%, #00D4FF 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .game-title {
            font-size: 24px;
            font-weight: 900;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 700;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 900;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 400px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: pulseMatch 0.5s ease;
            opacity: 0.4;
            transform: rotateY(180deg) scale(0.95);
            filter: grayscale(100%);
            border-color: #00c853;
            box-shadow: none;
            cursor: default;
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border-radius: 12px;
        }

        .card-back {
            background: linear-gradient(135deg, #FF0080, #764ba2);
        }

        .card-front {
            background: white;
            color: #333;
            transform: rotateY(180deg);
        }

        @keyframes pulseMatch {
            0% {
                transform: rotateY(180deg) scale(1);
            }

            50% {
                transform: rotateY(180deg) scale(1.1);
                box-shadow: 0 0 30px #00c853;
                border-color: #00c853;
            }

            100% {
                transform: rotateY(180deg) scale(0.95);
                border-color: #00c853;
                opacity: 0.4;
            }
        }

        .win-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-points {
            font-size: 48px;
            font-weight: 900;
            color: #FF0080;
            margin: 20px 0;
        }

        .btn-restart {
            background: linear-gradient(135deg, #FF0080, #00D4FF);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='games.html'"><i data-lucide="arrow-left"></i></button>
        <div class="game-title">🧩 Memory Calabria</div>
        <div style="width: 45px;"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-label">Mosse</div>
            <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Coppie</div>
            <div class="stat-value" id="pairs">0/8</div>
        </div>
    </div>

    <div class="memory-grid" id="grid"></div>

    <div class="win-modal" id="winModal">
        <div class="modal-content">
            <div style="font-size: 60px;">🏆</div>
            <h2 style="font-weight: 900;">Grande!</h2>
            <p>Hai completato il Memory!</p>
            <div class="modal-points">+15 Punti</div>
            <button class="btn-restart" onclick="location.reload()">Gioca Ancora</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const icons = ['🌶️', '🎭', '🌊', '🍕', '⚓', '🚢', '🍋', '🏰'];
        let cards = [...icons, ...icons];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let lockBoard = false;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const grid = document.getElementById('grid');
            shuffle(cards).forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-back">🤔</div>
                    <div class="card-front">${icon}</div>
                `;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard || flippedCards.includes(card) || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.icon === card2.dataset.icon) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                document.getElementById('pairs').innerText = `${matchedPairs}/8`;
                flippedCards = [];
                if (matchedPairs === 8) endGame();
            } else {
                lockBoard = true;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                }, 1000);
            }
        }

        async function endGame() {
            document.getElementById('winModal').style.display = 'flex';

            // Calculate score based on moves (fewer moves = higher score)
            // Minimum plausible moves is 8 (lucky) to ~20
            // Base score 100 - moves * 2, min 10
            let score = Math.max(10, 100 - (moves * 2));

            // Save to leaderboard
            if (typeof saveGameScore === 'function') {
                saveGameScore('memory', score);
            }

            await addPoints(15);
        }

        async function addPoints(pts) {
            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';
            try {
                const { data: current } = await supabaseClient.from('user_points').select('points').eq('user_email', email).single();
                const newPoints = (current?.points || 0) + pts;
                await supabaseClient.from('user_points').update({ points: newPoints, updated_at: new Date().toISOString() }).eq('user_email', email);
            } catch (err) {
                console.error('Error adding points:', err);
            }
        }

        createBoard();
    </script>
</body>

</html>
