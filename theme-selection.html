<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scegli la tua Palette - Hotel Posta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="theme-manager.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            text-shadow: var(--text-shadow);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.9;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (min-width: 480px) {
            .theme-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .theme-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .theme-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }

        .theme-card.active {
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.3);
        }

        .theme-preview {
            width: 100%;
            height: 80px;
            border-radius: 12px;
            background: var(--preview-gradient);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .theme-card h3 {
            color: white;
            font-size: 16px;
            font-weight: 800;
            text-shadow: var(--text-shadow);
        }

        .preview-bubble {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--preview-bubble);
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.3);
        }

        .confirm-btn {
            width: 100%;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: var(--text-shadow);
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .confirm-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.02);
        }

        .confirm-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Personalizza la tua App</h1>
            <p>Scegli l'atmosfera che preferisci per il tuo soggiorno</p>
        </div>

        <div class="theme-grid" id="themeGrid">
            <!-- Cards will be generated by JS -->
        </div>

        <button class="confirm-btn" id="confirmBtn">✨ Continua all'App</button>
    </div>

    <script>
        const grid = document.getElementById('themeGrid');
        const confirmBtn = document.getElementById('confirmBtn');
        let selectedTheme = localStorage.getItem('guestos_theme') || 'neon-dreams';

        function renderThemes() {
            grid.innerHTML = '';
            Object.entries(guestosThemes).forEach(([id, config]) => {
                const card = document.createElement('div');
                card.className = `theme-card ${id === selectedTheme ? 'active' : ''}`;
                card.style.setProperty('--preview-gradient', config.variables['--primary-gradient']);
                card.style.setProperty('--preview-bubble', config.variables['--bubble-gradient']);

                card.innerHTML = `
                    <div class="theme-preview">
                        <div class="preview-bubble"></div>
                    </div>
                    <h3>${config.name}</h3>
                `;

                card.onclick = () => {
                    selectedTheme = id;
                    applyTheme(id);
                    renderThemes();
                };

                grid.appendChild(card);
            });
        }

        confirmBtn.onclick = () => {
            window.location.href = 'index.html';
        };

        // Initial apply to set CSS variables for the current view
        applyTheme(selectedTheme);
        renderThemes();
    </script>
</body>

</html>
