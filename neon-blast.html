<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Blast - Hotel Posta</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a12;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
            z-index: 0;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .game-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #8b5cf6, #6366f1);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        .score-display {
            position: absolute;
            top: 100px;
            font-size: 80px;
            font-weight: 900;
            color: white;
            opacity: 0.2;
            z-index: 5;
            pointer-events: none;
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(20px);
            z-index: 110;
            padding: 30px;
            text-align: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
        }

        .action-btn {
            background: white;
            color: #0a0a12;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        .final-score {
            font-size: 64px;
            font-weight: 900;
            color: #8b5cf6;
            margin-bottom: 24px;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
        }

        .how-to-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }

        .how-to-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .how-to-item:last-child {
            margin-bottom: 0;
        }

        .how-to-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b5cf6;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='games.html'"><i data-lucide="arrow-left"></i></button>
        <div class="game-title">Neon Blast</div>
        <div style="width: 44px;"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="score-display" id="scoreDisplay">0</div>

    <!-- Start Overlay -->
    <div id="startOverlay" class="ui-overlay">
        <div class="glass-panel">
            <div style="font-size: 60px; margin-bottom: 20px;">💥</div>
            <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 8px;">Neon Blast</h2>
            <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 24px;">Reazione a catena</p>

            <div class="how-to-box">
                <div class="how-to-item">
                    <div class="how-to-icon"><i data-lucide="target" style="width:16px;"></i></div>
                    <div>Tocca i <b>cristalli</b> a mezz'aria</div>
                </div>
                <div class="how-to-item">
                    <div class="how-to-icon"><i data-lucide="zap" style="width:16px;"></i></div>
                    <div>Sii veloce: non farli cadere!</div>
                </div>
                <div class="how-to-item">
                    <div class="how-to-icon"><i data-lucide="bomb" style="width:16px;"></i></div>
                    <div>Non toccare i <b>nuclei neri</b></div>
                </div>
            </div>

            <button class="action-btn" onclick="startGame()">FAI ESPLODERE</button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverOverlay" class="ui-overlay hidden">
        <div class="glass-panel">
            <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 12px; color: #ef4444;">DISINTEGRATO</h2>
            <div class="final-score" id="finalScoreDisplay">0</div>
            <div id="hotelPointsDisplay"
                style="color: #facc15; font-weight: 800; font-size: 20px; margin-bottom: 32px;">+0 Punti Hotel</div>
            <button class="action-btn" onclick="startGame()">RITENTA</button>
            <button class="action-btn" style="margin-top: 12px; background: rgba(255,255,255,0.1); color: white;"
                onclick="window.location.href='games.html'">ESCI</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, dpr;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        let gameState = 'start'; // start, playing, over
        let score = 0;
        let shapes = [];
        let particles = [];
        let spawnRate = 60;
        let lastSpawn = 0;
        let gameSpeed = 2;

        const SHAPE_TYPES = {
            CRYSTAL: 'crystal',
            BOMB: 'bomb'
        };

        const COLORS = ['#8b5cf6', '#6366f1', '#ec4899', '#4ade80', '#06b6d4'];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Shape {
            constructor() {
                this.type = Math.random() > 0.15 ? SHAPE_TYPES.CRYSTAL : SHAPE_TYPES.BOMB;
                this.size = 40 + Math.random() * 20;
                this.x = Math.random() * (width - this.size) + this.size / 2;
                this.y = -this.size;
                this.speed = (1.5 + Math.random() * 1.5) * gameSpeed;
                this.color = this.type === SHAPE_TYPES.BOMB ? '#333' : COLORS[Math.floor(Math.random() * COLORS.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
            }
            update() {
                this.y += this.speed;
                this.rotation += this.rotSpeed;
                return this.y > height + this.size;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.shadowBlur = this.type === SHAPE_TYPES.BOMB ? 0 : 15;
                ctx.shadowColor = this.color;
                ctx.strokeStyle = this.type === SHAPE_TYPES.BOMB ? '#ff5555' : this.color;
                ctx.lineWidth = 3;

                if (this.type === SHAPE_TYPES.CRYSTAL) {
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size / 2);
                    ctx.lineTo(this.size / 2, 0);
                    ctx.lineTo(0, this.size / 2);
                    ctx.lineTo(-this.size / 2, 0);
                    ctx.closePath();
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 3, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                ctx.restore();
            }
            checkHit(tx, ty) {
                const dist = Math.sqrt((this.x - tx) ** 2 + (this.y - ty) ** 2);
                return dist < this.size;
            }
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            shapes = [];
            particles = [];
            spawnRate = 60;
            gameSpeed = 1.5;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('scoreDisplay').textContent = "0";
            requestAnimationFrame(loop);
        }

        function loop() {
            if (gameState !== 'playing') return;
            ctx.clearRect(0, 0, width, height);

            lastSpawn++;
            if (lastSpawn > spawnRate) {
                shapes.push(new Shape());
                lastSpawn = 0;
                spawnRate = Math.max(20, spawnRate - 0.1);
                gameSpeed += 0.002;
            }

            for (let i = shapes.length - 1; i >= 0; i--) {
                if (shapes[i].update()) {
                    if (shapes[i].type === SHAPE_TYPES.CRYSTAL) gameOver();
                    shapes.splice(i, 1);
                } else {
                    shapes[i].draw();
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
                else particles[i].draw();
            }

            requestAnimationFrame(loop);
        }

        canvas.addEventListener('touchstart', handleInput);
        canvas.addEventListener('mousedown', handleInput);

        function handleInput(e) {
            if (gameState !== 'playing') return;
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;

            for (let i = shapes.length - 1; i >= 0; i--) {
                if (shapes[i].checkHit(x, y)) {
                    const hitShape = shapes[i];
                    shapes.splice(i, 1);

                    if (hitShape.type === SHAPE_TYPES.BOMB) {
                        gameOver();
                    } else {
                        score++;
                        document.getElementById('scoreDisplay').textContent = score;
                        // Blast effect
                        for (let j = 0; j < 15; j++) particles.push(new Particle(hitShape.x, hitShape.y, hitShape.color));
                    }
                    break;
                }
            }
        }

        async function gameOver() {
            gameState = 'over';
            const hotelPoints = Math.min(Math.floor(score / 5), 20);
            document.getElementById('finalScoreDisplay').textContent = score;
            document.getElementById('hotelPointsDisplay').textContent = `+${hotelPoints} Punti Hotel`;
            document.getElementById('gameOverOverlay').classList.remove('hidden');

            if (hotelPoints > 0) await savePoints(hotelPoints);
            if (typeof saveGameScore === 'function') saveGameScore('neon_blast', score);
        }

        async function savePoints(pts) {
            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';
            try {
                const { data } = await supabaseClient.from('user_points').select('points').eq('user_email', email).single();
                const newPts = (data?.points || 0) + pts;
                await supabaseClient.from('user_points').upsert({ user_email: email, user_name: localStorage.getItem('guestos_user_name') || 'Ospite', points: newPts, updated_at: new Date().toISOString() }, { onConflict: 'user_email' });
            } catch (e) { console.error(e); }
        }
    </script>
</body>

</html>
