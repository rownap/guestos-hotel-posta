<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - GuestOS</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            color: #333;
        }

        h1 {
            color: #FF0080;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="icon">📡</div>
    <h1>Sei Offline</h1>
    <p>Sembra che non ci sia connessione internet.</p>
    <p>Riprova quando sarai connesso per vedere le ultime offerte!</p>
    <button onclick="window.location.reload()"
        style="background: #FF0080; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 16px; margin-top: 20px; cursor: pointer;">Riprova</button>
</body>

</html>
