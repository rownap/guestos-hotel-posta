<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Stack - Hotel Posta</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="game-leaderboard.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a12;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.2) 0%, transparent 40%);
            z-index: 0;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .back-btn {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .score-container {
            text-align: center;
            margin-top: 10px;
        }

        .current-score {
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, #aaa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
        }

        .best-score {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        /* UI Overlays */
        .start-screen,
        .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            width: 90%;
            max-width: 400px;
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        .title-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: #a5b4fc;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .action-btn {
            background: white;
            color: #0a0a12;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 16px;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .game-over-panel {
            background: rgba(19, 19, 31, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .final-score-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .final-score {
            font-size: 64px;
            font-weight: 900;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .points-earned {
            color: #fbbf24;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .how-to-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
            width: 100%;
        }

        .how-to-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .how-to-item:last-child {
            margin-bottom: 0;
        }

        .how-to-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
        }

        .perfect-badge {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #fff;
            font-weight: 900;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 100;
        }

        @keyframes perfectPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }

        .animate-perfect {
            animation: perfectPop 0.6s ease-out forwards;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='games.html'">
            <i data-lucide="arrow-left"></i>
        </button>
        <div class="score-container" id="gameUI" style="opacity: 0; transition: opacity 0.5s;">
            <div class="current-score" id="score">0</div>
            <div class="best-score">BEST: <span id="bestScore">0</span></div>
        </div>
        <div style="width: 44px;"></div>
    </div>

    <!-- Perfect Hit Effect -->
    <div id="perfectBadge" class="perfect-badge">PERFECT!</div>

    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen -->
    <div id="startScreen" class="start-screen">
        <div class="title-badge">Arcade</div>
        <div class="game-title">NEON<br>STACK</div>

        <div class="how-to-box">
            <div class="how-to-item">
                <div class="how-to-icon"><i data-lucide="mouse-pointer-2" style="width:16px;"></i></div>
                <div>Tocca per <b>posizionare</b> il blocco</div>
            </div>
            <div class="how-to-item">
                <div class="how-to-icon"><i data-lucide="layers" style="width:16px;"></i></div>
                <div>Impilali perfettamente per non restringere</div>
            </div>
            <div class="how-to-item">
                <div class="how-to-icon"><i data-lucide="zap" style="width:16px;"></i></div>
                <div>Raggiungi l'altezza massima!</div>
            </div>
        </div>

        <button class="action-btn" onclick="startGame()">GIOCA</button>
        <div style="margin-top: 20px; font-size: 14px; opacity: 0.5;">
            <i data-lucide="trophy" style="width: 14px; height: 14px; vertical-align: middle;"></i>
            Vinci fino a 100 punti hotel
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="game-over-screen hidden">
        <div class="game-over-panel">
            <div class="final-score-label">Punteggio Finale</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="points-earned">
                <i data-lucide="coins" style="width: 20px; height: 20px;"></i>
                <span id="earnedPoints">+0 Punti Hotel</span>
            </div>
        </div>

        <button class="action-btn" onclick="startGame()">RITENTA</button>
        <button class="action-btn secondary-btn" onclick="window.location.href='games.html'">ESCI</button>
    </div>

    <script>
        lucide.createIcons();

        // Game Configuration
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Colors
        const COLORS = [
            '#6366f1', // Indigo
            '#8b5cf6', // Violet
            '#d946ef', // Fuchsia
            '#ec4899', // Pink
            '#f43f5e', // Rose
            '#f97316', // Orange
            '#eab308', // Yellow
            '#22c55e', // Green
            '#06b6d4', // Cyan
            '#3b82f6'  // Blue
        ];

        // State variables
        let animationId;
        let gameActive = false;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('stack_best_score') || '0');
        let blocks = [];
        let currentBlock = null;
        let blockSpeed = 2; // Reduced speed for better playability
        let direction = 1;
        let width = 0;
        let height = 0;
        const BASE_SIZE = 150; // Use a fixed logical width for easier calculation
        const BLOCK_HEIGHT = 25;
        let cameraY = 0;
        let lastTime = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

            // Redraw if not playing
            if (!gameActive && blocks.length > 0) {
                render();
            }
        }

        window.addEventListener('resize', resize);
        resize();

        // Update Best Score UI
        document.getElementById('bestScore').textContent = bestScore;

        class Block {
            constructor(x, y, w, color, moving = false) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = BLOCK_HEIGHT;
                this.color = color;
                this.moving = moving;
                this.placed = false;
            }

            draw(offsetY) {
                // Calculate position relative to center of screen
                const drawX = (width / 2) - (this.w / 2) + this.x;
                const drawY = height - 100 - (this.y * this.h) + offsetY;

                if (drawY < -50) return; // Don't draw if off screen top

                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;

                // Block body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.roundRect(drawX, drawY, this.w, this.h, 4);
                ctx.fill();

                // Bevel highlight (top)
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(drawX, drawY, this.w, 4);
            }

            update(dt) {
                if (this.moving) {
                    this.x += blockSpeed * direction * (dt / 16);

                    // Bounce bounds (relative to center)
                    const limit = 180;
                    if (this.x > limit) {
                        this.x = limit;
                        direction = -1;
                    } else if (this.x < -limit) {
                        this.x = -limit;
                        direction = 1;
                    }
                }
            }
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameUI').style.opacity = '1';

            score = 0;
            document.getElementById('score').textContent = score;

            blocks = [];
            currentBlock = null;
            cameraY = 0;
            blockSpeed = 2.5; // Start reasonable

            // Base block
            blocks.push(new Block(0, 0, BASE_SIZE, COLORS[0]));

            spawnNextBlock();

            gameActive = true;
            lastTime = performance.now();
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop(lastTime);
        }

        function spawnNextBlock() {
            const prevBlock = blocks[blocks.length - 1];
            const color = COLORS[score % COLORS.length];

            // Next block starts offset
            const startX = -200;
            direction = 1;

            currentBlock = new Block(startX, score + 1, prevBlock.w, color, true);
        }

        function gameLoop(time) {
            if (!gameActive) return;

            const dt = time - lastTime;
            lastTime = time;

            ctx.clearRect(0, 0, width, height);

            // Update current block
            if (currentBlock) {
                currentBlock.update(dt);
            }

            // Camera follow
            const targetCamY = Math.max(0, (score - 5) * BLOCK_HEIGHT);
            cameraY += (targetCamY - cameraY) * 0.1;

            // Render blocks
            [...blocks, currentBlock].forEach(b => {
                if (b) b.draw(cameraY);
            });

            animationId = requestAnimationFrame(gameLoop);
        }

        function render() {
            ctx.clearRect(0, 0, width, height);
            // Render blocks
            [...blocks, currentBlock].forEach(b => {
                if (b) b.draw(cameraY);
            });
        }

        // Tap handler
        function handleTap(e) {
            if (!gameActive) {
                // Ignore taps on UI elements
                if (e.target.tagName === 'BUTTON') return;
                // If start screen is visible, start game maybe? Button does it.
                return;
            }

            // Prevent default zooming etc
            // e.preventDefault();

            placeBlock();
        }

        canvas.addEventListener('mousedown', handleTap);
        canvas.addEventListener('touchstart', (e) => {
            // e.preventDefault(); // prevents mouse emulation but might break scrolling if we had any
            handleTap(e);
        }, { passive: false });

        function placeBlock() {
            if (!currentBlock) return;

            const prevBlock = blocks[blocks.length - 1];
            const dist = currentBlock.x - prevBlock.x;
            const absDist = Math.abs(dist);

            // Tolerance for "perfect" hit
            const TOLERANCE = 5;

            if (absDist <= TOLERANCE) {
                // Perfect hit!
                currentBlock.x = prevBlock.x;
                showPerfectEffect();
                // Bonus? Maybe just keeping size is reward enough.
            } else if (absDist > prevBlock.w) {
                // Missed completely
                gameOver();
                return;
            } else {
                // Cut the block
                currentBlock.w -= absDist;
                // Shift position to match the remaining part
                if (dist > 0) {
                    currentBlock.x += absDist / 2;
                } else {
                    currentBlock.x -= absDist / 2;
                }
            }

            currentBlock.moving = false;
            blocks.push(currentBlock);

            score++;
            document.getElementById('score').textContent = score;

            // Increase speed slightly
            blockSpeed += 0.05;
            if (blockSpeed > 6) blockSpeed = 6;

            spawnNextBlock();
        }

        function showPerfectEffect() {
            const el = document.getElementById('perfectBadge');
            el.classList.remove('animate-perfect');
            void el.offsetWidth; // trigger reflow
            el.classList.add('animate-perfect');
        }

        async function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationId);

            // Update Best Score
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('stack_best_score', bestScore);
                document.getElementById('bestScore').textContent = bestScore;
            }

            // Calculate Rewards
            // 1 point per block, max 20 (hard cap)
            const hotelPoints = Math.min(score, 20);

            // UI Interaction
            document.getElementById('gameUI').style.opacity = '0';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('earnedPoints').textContent = `+${hotelPoints} Punti Hotel`;
            document.getElementById('gameOverScreen').classList.remove('hidden');

            // Save Data
            if (hotelPoints > 0) {
                await addPoints(hotelPoints);
            }

            // Save to Leaderboard
            if (typeof saveGameScore === 'function') {
                saveGameScore('tower_stack', score);
            }
        }

        async function addPoints(pts) {
            const email = localStorage.getItem('guestos_user_email') || 'guest@hotel.com';
            try {
                const { data: current } = await supabaseClient.from('user_points').select('points').eq('user_email', email).single();
                const newPoints = (current?.points || 0) + pts;
                await supabaseClient.from('user_points').update({ points: newPoints, updated_at: new Date().toISOString() }).eq('user_email', email);
            } catch (err) {
                console.error('Error adding points:', err);
            }
        }
    </script>
</body>

</html>
